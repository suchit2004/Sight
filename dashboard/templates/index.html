<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SafeSight Admin Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
        }

        .sidebar {
            position: fixed;
            width: 220px;
            height: 100%;
            background: #020617;
            padding: 20px;
        }

        .sidebar h2 {
            color: #38bdf8;
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: #cbd5f5;
            padding: 10px;
            text-decoration: none;
            margin-bottom: 6px;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: #1e293b;
        }

        .main {
            margin-left: 240px;
            padding: 20px;
        }

        .topbar {
            background: #020617;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        .status {
            color: #22c55e;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .card {
            background: #020617;
            padding: 15px;
            border-radius: 10px;
        }

        .fire {
            background: #ef4444;
        }
        .card h3 {
            margin-top: 0;
            color: #38bdf8;
        }

        .controls button {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: none;
            border-radius: 6px;
            background: #1e293b;
            color: #94a3b8;
            cursor: pointer;
        }

        .controls button.primary {
            background: #2563eb;
            color: white;
        }

        .controls button.disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }

        .event-log {
            max-height: 280px;
            overflow-y: auto;
            font-size: 14px;
        }

        .event-log p {
            border-bottom: 1px solid #1e293b;
            padding-bottom: 6px;
        }

        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }

        .intrusion { background: #dc2626; }
        .fall { background: #f59e0b; }
        .loitering { background: #a855f7; }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
    <h2>SafeSight</h2>
    <a href="#">Live Monitor</a>
    <a href="#">Event Logs</a>
    <a href="#">ROI Management</a>
    <a href="#">Crowd Analytics (Soon)</a>
    <a href="#">Fire Detection (Soon)</a>
    <a href="#">Face Recognition (Soon)</a>
    <a href="#">System Health</a>
    <a href="#">Settings</a>
</div>

<!-- ================= MAIN ================= -->
<div class="main">

    <div class="topbar">
        <div>
            System Status: <span class="status">ONLINE</span> |
            Edge Mode: ACTIVE |
            Camera: CCTV-1
        </div>
        <div>
            FPS: ~12 | Latency: ~180ms
        </div>
    </div>

    <div class="grid">

        <!-- ============ VIDEO CARD ============ -->
        <div class="card">
            <h3>Live CCTV Feed</h3>

            <div style="position: relative;">
                <img id="video" src="/video_feed" width="100%">
                <canvas id="roiCanvas"></canvas>
            </div>
        </div>

        <!-- ============ CONTROLS ============ -->
        <div class="card controls">
            <h3>System Controls</h3>

            <button class="primary" onclick="startROIMode()">Add Restricted Zone</button>

            <button class="primary" onclick="saveROI()">Save ROI</button>

            <button class="primary" onclick="toggleCrowd()">Enable / Disable Crowd Detection</button>

            <button class="primary" onclick="toggleFire()">Enable Fire Detection</button>

            <button class="primary" onclick="toggleFall()">Enable Fall Detection</button>

            <button class="disabled">Face Recognition</button>
            
            <button class="primary" onclick="viewSnapshots()">View Snapshots</button>
            
            <button class="primary" onclick="exportLogs()">Export Logs</button>

            <button class="primary" onclick="toggleAccident()">Enable Accident Detection</button>
            
            <button onclick="fetch('/toggle_segmentation', {method:'POST'})"> Toggle Segmentation</button>
            
            <button onclick="fetch('/toggle_face', {method:'POST'})">Toggle Face Recognition</button>

        </div>
    </div>

    <br>

    <!-- ============ EVENT LOG ============ -->
    <div class="card">
        <h3>Real-Time Event Logs</h3>
        <div id="event-log" class="event-log">
            No events yet.
        </div>
    </div>

</div>

<!-- ================= JS ================= -->
<script>
const canvas = document.getElementById("roiCanvas");
const ctx = canvas.getContext("2d");
const video = document.getElementById("video");

let drawing = false;
let points = [];

video.onload = () => {
    canvas.width = video.clientWidth;
    canvas.height = video.clientHeight;
};

function startROIMode() {
    points = [];
    drawing = true;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

canvas.addEventListener("click", e => {
    if (!drawing) return;

    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    points.push([x, y]);

    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();

    if (points.length > 1) {
        ctx.strokeStyle = "red";
        ctx.beginPath();
        ctx.moveTo(points[points.length-2][0], points[points.length-2][1]);
        ctx.lineTo(x, y);
        ctx.stroke();
    }
});

function toggleAccident() {
    fetch("/toggle_accident", { method: "POST" })
        .then(res => res.json())
        .then(data => console.log("Accident detection:", data.enabled));
}

function saveROI() {
    drawing = false;

    fetch("/set_roi", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ points })
    });
}

function viewSnapshots() {
    fetch("/snapshots")
        .then(res => res.json())
        .then(data => {
            if (data.length === 0) { alert("No snapshots yet."); return; }
            window.open(data[0].url, "_blank");
        });
}

function toggleFall() {
    fetch("/toggle_fall", { method: "POST" })
        .then(res => res.json())
        .then(data => console.log("Fall detection:", data.enabled));
}

function exportLogs() {
    window.open("/export_logs_csv", "_blank");
}

function toggleCrowd() {
    fetch("/toggle_crowd", { method: "POST" })
        .then(res => res.json())
        .then(data => {
            alert(
                data.enabled
                ? "Crowd Detection ENABLED"
                : "Crowd Detection DISABLED"
            );
        });
}


function toggleFire() {
    fetch("/toggle_fire", { method: "POST" })
        .then(res => res.json())
        .then(data => {
            alert("Fire Detection: " + (data.enabled ? "ON" : "OFF"));
        });
}
// ---------------- EVENT LOG UPDATE ----------------
setInterval(() => {
    fetch("/events")
        .then(res => res.json())
        .then(data => {
            const log = document.getElementById("event-log");
            if (data.length === 0) {
                log.innerHTML = "No events detected yet.";
                return;
            }

            log.innerHTML = data.map(e => {
                let cls = e.type.toLowerCase();
                return `
                    <p>
                        <span class="badge ${cls}">${e.type}</span>
                        ${e.time} - ${e.details}
                    </p>`;
            }).join("");
        });
}, 2000);
</script>

</body>
</html>
