<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SafeSight Admin Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e5e7eb;
        }

        .sidebar {
            position: fixed;
            width: 220px;
            height: 100%;
            background: #020617;
            padding: 20px;
        }

        .sidebar h2 {
            color: #38bdf8;
            margin-bottom: 20px;
        }

        .sidebar a {
            display: block;
            color: #cbd5f5;
            padding: 10px;
            text-decoration: none;
            margin-bottom: 6px;
            border-radius: 5px;
        }

        .sidebar a:hover {
            background: #1e293b;
        }

        .main {
            margin-left: 240px;
            padding: 20px;
        }

        .topbar {
            background: #020617;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status {
            color: #22c55e;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .card {
            background: #020617;
            padding: 15px;
            border-radius: 10px;
        }

        .card h3 {
            margin-top: 0;
            color: #38bdf8;
        }

        .controls button {
            width: 100%;
            padding: 10px;
            margin-bottom: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s, color 0.2s;
        }

        /* Blue — static action buttons */
        .controls button.primary {
            background: #2563eb;
            color: white;
        }

        /* Green — toggle is ON */
        .controls button.on {
            background: #16a34a;
            color: white;
        }

        /* Red — toggle is OFF */
        .controls button.off {
            background: #dc2626;
            color: white;
        }

        /* Grey — coming soon / disabled */
        .controls button.disabled {
            background: #1e293b;
            color: #94a3b8;
            cursor: not-allowed;
            opacity: 0.5;
        }

        .event-log {
            max-height: 280px;
            overflow-y: auto;
            font-size: 14px;
        }

        .event-log p {
            border-bottom: 1px solid #1e293b;
            padding-bottom: 6px;
            margin: 6px 0;
        }

        .badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 6px;
        }

        .intrusion  { background: #dc2626; }
        .loitering  { background: #a855f7; }
        .fall       { background: #f59e0b; color: #000; }
        .crowd      { background: #0ea5e9; }
        .fire       { background: #f97316; }
        .accident   { background: #ef4444; }
        .snapshot   { background: #6b7280; }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

<!-- ================= SIDEBAR ================= -->
<div class="sidebar">
    <h2>SafeSight</h2>
    <a href="#">Live Monitor</a>
    <a href="#">Event Logs</a>
    <a href="#">ROI Management</a>
    <a href="#">Crowd Analytics</a>
    <a href="#">Fire Detection</a>
    <a href="#">Face Recognition</a>
    <!-- <a href="#">System Health</a> -->
    <!-- <a href="#">Settings</a> -->
</div>

<!-- ================= MAIN ================= -->
<div class="main">

    <div class="topbar">
        <div>
            System Status: <span class="status">ONLINE</span> |
            Edge Mode: ACTIVE |
            Camera: CCTV-1
        </div>
        <div id="live-stats">FPS: -- | Latency: --ms | Persons: --</div>
    </div>

    <div class="grid">

        <!-- ============ VIDEO CARD ============ -->
        <div class="card">
            <h3>Live CCTV Feed</h3>
            <div style="position: relative;">
                <img id="video" src="/video_feed" width="100%">
                <canvas id="roiCanvas"></canvas>
            </div>
        </div>

        <!-- ============ CONTROLS ============ -->
        <div class="card controls">
            <h3>System Controls</h3>

            <button class="primary" onclick="startROIMode()">Add Restricted Zone</button>
            <button class="primary" onclick="saveROI()">Save ROI</button>

            <button id="btn-crowd"    class="off" onclick="toggle('crowd')">
                Crowd Detection: OFF
            </button>

            <button id="btn-fire"     class="off" onclick="toggle('fire')">
                Fire Detection: OFF
            </button>

            <button id="btn-fall"     class="off" onclick="toggle('fall')">
                Fall Detection: OFF
            </button>

            <button id="btn-face" class="off" onclick="toggle('face')">
                Face Recognition: OFF
            </button>

            <button class="primary" onclick="viewSnapshots()">View Snapshots</button>
            <button class="primary" onclick="exportLogs()">Export Logs</button>
        </div>
    </div>

    <br>

    <!-- ============ EVENT LOG ============ -->
    <div class="card">
        <h3>Real-Time Event Logs</h3>
        <div id="event-log" class="event-log">No events yet.</div>
    </div>

    <br>

    <!-- ============ FACE AUTH MANAGEMENT ============ -->

        <h3>Authorized Faces</h3>

</div>

<!-- ================= JS ================= -->
<script>
const canvas = document.getElementById("roiCanvas");
const ctx    = canvas.getContext("2d");
const video  = document.getElementById("video");

let drawing = false;
let points  = [];

video.onload = () => {
    canvas.width  = video.clientWidth;
    canvas.height = video.clientHeight;
};

// ── ROI ───────────────────────────────────────────────────────────────────────
function startROIMode() {
    points  = [];
    drawing = true;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
}

canvas.addEventListener("click", e => {
    if (!drawing) return;
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    points.push([x, y]);
    ctx.fillStyle = "red";
    ctx.beginPath();
    ctx.arc(x, y, 5, 0, Math.PI * 2);
    ctx.fill();
    if (points.length > 1) {
        ctx.strokeStyle = "red";
        ctx.lineWidth   = 2;
        ctx.beginPath();
        ctx.moveTo(points[points.length-2][0], points[points.length-2][1]);
        ctx.lineTo(x, y);
        ctx.stroke();
    }
});

function saveROI() {
    drawing = false;
    fetch("/set_roi", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ points })
    }).then(() => alert("ROI saved."));
}

// ── Toggle buttons ────────────────────────────────────────────────────────────
// Each toggle calls its route then updates the button directly from the response.
// No /status route needed — each route already returns {"enabled": bool}.
const TOGGLE_LABELS = {
    crowd:    "Crowd Detection",
    fire:     "Fire Detection",
    fall:     "Fall Detection",
    accident: "Accident Detection",
    face:     "Face Recognition",
};

function toggle(feature) {
    fetch(`/toggle_${feature}`, { method: "POST" })
        .then(res => res.json())
        .then(data => {
            const btn   = document.getElementById(`btn-${feature}`);
            const label = TOGGLE_LABELS[feature];
            const isOn  = data.enabled;
            btn.textContent = `${label}: ${isOn ? "ON" : "OFF"}`;
            btn.className   = isOn ? "on" : "off";
        });
}

// ── Snapshots & Export ────────────────────────────────────────────────────────
function viewSnapshots() {
    fetch("/snapshots")
        .then(res => res.json())
        .then(data => {
            if (data.length === 0) { alert("No snapshots yet."); return; }
            window.open(data[0].url, "_blank");
        });
}

function exportLogs() {
    window.open("/export_logs_csv", "_blank");
}

// ── Face management ───────────────────────────────────────────────────────────
function refreshFaces() {
    fetch("/faces")
        .then(res => res.json())
        .then(data => {
            const users = data.users || [];
            const trained = !!data.trained;
            document.getElementById("faces-status").textContent =
                `Model: ${trained ? "TRAINED" : "NOT TRAINED"} | Users: ${users.length}`;

            const list = document.getElementById("faces-list");
            if (users.length === 0) {
                list.innerHTML = "No authorized users.";
                return;
            }
            list.innerHTML = users.map(u => {
                return `<p style="display:flex; justify-content:space-between; gap:10px; align-items:center;">
                    <span>${u}</span>
                    <button class="off" style="padding:6px 10px; font-size:12px; width:auto;"
                            onclick="deleteFace('${u.replace(/'/g, "\\'")}')">Remove</button>
                </p>`;
            }).join("");
        })
        .catch(() => {});
}

function enrollFace() {
    const name = document.getElementById("face-name").value.trim();
    const file = document.getElementById("face-file").files[0];
    if (!name || !file) { alert("Please provide name and image."); return; }
    const fd = new FormData();
    fd.append("name", name);
    fd.append("image", file);
    fetch("/enroll_face", { method: "POST", body: fd })
        .then(res => res.json())
        .then(data => {
            if (data.error) { alert(data.error); return; }
            document.getElementById("face-file").value = "";
            refreshFaces();
            alert("Enrolled.");
        })
        .catch(() => alert("Enroll failed."));
}

function deleteFace(name) {
    if (!confirm(`Remove ${name}?`)) return;
    fetch("/delete_face", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name })
    })
        .then(res => res.json())
        .then(() => refreshFaces())
        .catch(() => {});
}

// ── Live metrics ──────────────────────────────────────────────────────────────
setInterval(() => {
    fetch("/metrics")
        .then(res => res.json())
        .then(data => {
            const s = data.system;
            document.getElementById("live-stats").textContent =
                `FPS: ${s.fps} | Latency: ${s.latency_ms}ms | Persons: ${s.person_count}`;
        })
        .catch(() => {});
}, 1000);

// ── Event log ─────────────────────────────────────────────────────────────────
setInterval(() => {
    fetch("/events")
        .then(res => res.json())
        .then(data => {
            const log = document.getElementById("event-log");
            if (data.length === 0) {
                log.innerHTML = "No events detected yet.";
                return;
            }
            log.innerHTML = data.map(e => {
                const cls = e.type.toLowerCase().replace(/_/g, "-");
                return `<p>
                    <span class="badge ${cls}">${e.type}</span>
                    ${e.time} — ${e.details}
                </p>`;
            }).join("");
        })
        .catch(() => {});
}, 2000);

// initial load
refreshFaces();
</script>

</body>
</html>
